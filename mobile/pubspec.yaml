name: medorder
description: "MedOrder - B2B Medical Supply Platform for Doctors & Clinics"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0

  # Dependency Injection
  get_it: ^7.6.0

  # Functional Programming
  dartz: ^0.10.1

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.5.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Serialization
  json_annotation: ^4.8.0

  # Firebase
  firebase_messaging: ^16.1.2

  # Utilities
  image_picker: ^1.0.0
  intl: ^0.20.2
  url_launcher: ^6.2.0
  connectivity_plus: ^5.0.0
  firebase_core: ^4.5.0
  socket_io_client: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  bloc_test: ^9.1.0
  mocktail: ^1.0.0
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: PublicSans
      fonts:
        - asset: assets/fonts/PublicSans-Variable.ttf
        - asset: assets/fonts/PublicSans-Italic-Variable.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-BoldItalic.ttf
          weight: 700
          style: italic
