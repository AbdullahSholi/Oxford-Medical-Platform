# ═══════════════════════════════════════════════════════════
# MedOrder — Nginx Server Block
# ═══════════════════════════════════════════════════════════

# Upstream API server
upstream api {
    server server:3000;
    keepalive 32;
}

# HTTP server (port 80) — serves API directly
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy — CORS is handled by Express server, not nginx
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # WebSocket support (Socket.IO)
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
    }

    # R2 media proxy — serves images with CORS headers to avoid
    # cross-origin issues on Flutter web (CanvasKit renderer)
    location /media/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control "public, max-age=31536000, immutable";

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass https://pub-e9f05437b08e4c4997ad96709a761250.r2.dev/;
        proxy_set_header Host pub-e9f05437b08e4c4997ad96709a761250.r2.dev;
        proxy_ssl_server_name on;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;

        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
    }

    # Block non-API requests
    location / {
        return 404;
    }
}
